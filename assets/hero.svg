<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#d97757" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#141413" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="12" fill="#141413"/>
  <rect width="800" height="320" rx="12" fill="url(#glow)"/>

  <!-- Decorative thin line -->
  <line x1="340" y1="42" x2="460" y2="42" stroke="#b0aea5" stroke-width="0.5" opacity="0.3"/>

  <!-- Top quote -->
  <text x="400" y="36" font-family="Georgia, 'Lora', serif" font-size="11" fill="#b0aea5" text-anchor="middle" font-style="italic" letter-spacing="1">Restraint is the highest form of engineering.</text>

  <!-- Fish icon — minimal, elegant -->
  <g transform="translate(400, 105)" opacity="0.9">
    <!-- Fish body - simple arc -->
    <path d="M-28 0 Q-10 -18 12 -8 Q28 -2 28 0 Q28 2 12 8 Q-10 18 -28 0Z" fill="#d97757" opacity="0.85"/>
    <!-- Tail -->
    <path d="M-28 0 L-42 -12 L-38 0 L-42 12 Z" fill="#d97757" opacity="0.65"/>
    <!-- Eye -->
    <circle cx="14" cy="-2" r="3" fill="#141413"/>
    <circle cx="15" cy="-3" r="1.2" fill="#faf9f5" opacity="0.8"/>
    <!-- Bubbles -->
    <circle cx="36" cy="-8" r="2.5" fill="none" stroke="#6a9bcc" stroke-width="0.8" opacity="0.4"/>
    <circle cx="44" cy="-16" r="1.8" fill="none" stroke="#6a9bcc" stroke-width="0.6" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="400" y="165" font-family="Poppins, Arial, sans-serif" font-size="42" font-weight="600" fill="#faf9f5" text-anchor="middle" letter-spacing="2">摸鱼</text>
  <text x="400" y="195" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="300" fill="#d97757" text-anchor="middle" letter-spacing="10">M O Y U</text>

  <!-- Subtitle -->
  <text x="400" y="224" font-family="Georgia, 'Lora', serif" font-size="13" fill="#b0aea5" text-anchor="middle" letter-spacing="0.5">Anti-Over-Engineering for AI Coding Agents</text>

  <!-- Decorative line -->
  <line x1="320" y1="242" x2="480" y2="242" stroke="#b0aea5" stroke-width="0.5" opacity="0.2"/>

  <!-- Stats -->
  <g transform="translate(400, 272)" text-anchor="middle" font-family="Poppins, Arial, sans-serif">
    <text x="-180" y="0" font-size="22" font-weight="600" fill="#d97757">−66%</text>
    <text x="-180" y="16" font-size="9" fill="#b0aea5" letter-spacing="1">LESS CODE</text>

    <text x="-60" y="0" font-size="22" font-weight="600" fill="#6a9bcc">10</text>
    <text x="-60" y="16" font-size="9" fill="#b0aea5" letter-spacing="1">PLATFORMS</text>

    <text x="60" y="0" font-size="22" font-weight="600" fill="#788c5d">5</text>
    <text x="60" y="16" font-size="9" fill="#b0aea5" letter-spacing="1">VARIANTS</text>

    <text x="180" y="0" font-size="22" font-weight="600" fill="#d97757">3</text>
    <text x="180" y="16" font-size="9" fill="#b0aea5" letter-spacing="1">LANGUAGES</text>
  </g>
</svg>
