<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <defs>
    <linearGradient id="fish-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e08a6a"/>
      <stop offset="100%" stop-color="#c96a47"/>
    </linearGradient>
    <radialGradient id="glow" cx="32%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#d97757" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#141413" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="rounded">
      <rect width="800" height="300" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="800" height="300" fill="#141413"/>
    <rect width="800" height="300" fill="url(#glow)"/>

    <!-- ===== LEFT: FISH MARK ===== -->
    <g transform="translate(240, 150) scale(1.8)">
      <!-- Shadow / depth -->
      <ellipse cx="4" cy="4" rx="36" ry="20" fill="#000" opacity="0.15"/>

      <!-- Fish body — smooth, organic -->
      <path d="M-36 0 C-28 -22, 8 -24, 30 -10 C38 -4, 38 4, 30 10 C8 24, -28 22, -36 0Z"
            fill="url(#fish-grad)"/>

      <!-- Tail -->
      <path d="M-34 0 L-52 -18 L-42 0 L-52 18 Z" fill="#d97757" opacity="0.6"/>

      <!-- Body highlight — gives volume -->
      <path d="M-20 -6 C-10 -18, 16 -18, 28 -8 C30 -6, 20 -4, 6 -6 C-4 -8, -14 -6, -20 -6Z"
            fill="#faf9f5" opacity="0.08"/>

      <!-- Eye -->
      <circle cx="18" cy="-5" r="5" fill="#141413"/>
      <circle cx="19.5" cy="-6.5" r="2" fill="#faf9f5" opacity="0.9"/>
    </g>

    <!-- ===== RIGHT: TEXT ===== -->

    <!-- Title -->
    <text x="420" y="118" font-family="'Noto Sans SC', 'PingFang SC', 'Hiragino Sans GB', sans-serif"
          font-size="56" font-weight="700" fill="#faf9f5">摸鱼</text>

    <!-- Subtitle -->
    <text x="422" y="150" font-family="Arial, Helvetica, sans-serif"
          font-size="18" font-weight="400" fill="#d97757" letter-spacing="2">Moyu</text>

    <!-- Tagline -->
    <text x="422" y="180" font-family="Georgia, serif"
          font-size="13" fill="#b0aea5" font-style="italic">Anti-over-engineering for AI coding agents</text>

    <!-- Stats row -->
    <g transform="translate(422, 216)" font-family="Arial, Helvetica, sans-serif">
      <text x="0" y="0" font-size="18" font-weight="700" fill="#d97757">−66%</text>
      <text x="52" y="0" font-size="11" fill="#b0aea5">less code</text>

      <circle cx="118" cy="-3" r="1.2" fill="#e8e6dc" opacity="0.3"/>

      <text x="130" y="0" font-size="18" font-weight="700" fill="#6a9bcc">10</text>
      <text x="152" y="0" font-size="11" fill="#b0aea5">platforms</text>

      <circle cx="218" cy="-3" r="1.2" fill="#e8e6dc" opacity="0.3"/>

      <text x="230" y="0" font-size="18" font-weight="700" fill="#788c5d">5</text>
      <text x="244" y="0" font-size="11" fill="#b0aea5">variants</text>
    </g>

    <!-- ===== BACKGROUND CONCEPT: code lines being reduced ===== -->
    <!-- Left side: many lines (over-engineered) — very subtle -->
    <g opacity="0.04" stroke="#d97757" stroke-width="1" stroke-linecap="round">
      <line x1="56" y1="60" x2="150" y2="60"/>
      <line x1="56" y1="72" x2="136" y2="72"/>
      <line x1="56" y1="84" x2="160" y2="84"/>
      <line x1="56" y1="96" x2="120" y2="96"/>
      <line x1="56" y1="108" x2="145" y2="108"/>
      <line x1="56" y1="120" x2="130" y2="120"/>
      <line x1="56" y1="132" x2="155" y2="132"/>
      <line x1="56" y1="144" x2="115" y2="144"/>
      <line x1="56" y1="156" x2="140" y2="156"/>
      <line x1="56" y1="168" x2="125" y2="168"/>
      <line x1="56" y1="180" x2="150" y2="180"/>
      <line x1="56" y1="192" x2="135" y2="192"/>
      <line x1="56" y1="204" x2="145" y2="204"/>
      <line x1="56" y1="216" x2="110" y2="216"/>
      <line x1="56" y1="228" x2="155" y2="228"/>
    </g>

    <!-- Right side: few lines (moyu) — subtle -->
    <g opacity="0.04" stroke="#788c5d" stroke-width="1" stroke-linecap="round">
      <line x1="660" y1="112" x2="740" y2="112"/>
      <line x1="660" y1="124" x2="725" y2="124"/>
      <line x1="660" y1="136" x2="750" y2="136"/>
      <line x1="660" y1="148" x2="715" y2="148"/>
      <line x1="660" y1="160" x2="735" y2="160"/>
    </g>
  </g>
</svg>
